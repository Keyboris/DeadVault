# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dms?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dms}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dms}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Virtual threads (Java 21) ────────────────────────────────────────────────
spring.threads.virtual.enabled=true

# ─── Quartz (JDBC store — survives restarts) ──────────────────────────────────
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.quartz.properties.org.quartz.threadPool.threadCount=4

# ─── LangChain4j / OpenAI ─────────────────────────────────────────────────────
# Shared by SmartContractGeneratorService and IntentExtractionService
langchain4j.openai.api-key=${OPENAI_API_KEY}
langchain4j.openai.model-name=gpt-4o
langchain4j.openai.temperature=0.0
langchain4j.openai.timeout=PT30S

# ─── JWT ──────────────────────────────────────────────────────────────────────
dms.jwt.secret=${JWT_SECRET}
dms.jwt.expiration-ms=86400000

# ─── Base blockchain (EIP-1559) ───────────────────────────────────────────────
# Testnet:  https://sepolia.base.org  (chain 84532)
# Mainnet:  https://mainnet.base.org  (chain 8453)
dms.blockchain.rpc-url=${BASE_RPC_URL:https://sepolia.base.org}
dms.blockchain.hot-wallet-key=${HOT_WALLET_PRIVATE_KEY}
dms.blockchain.factory-address=${FACTORY_CONTRACT_ADDRESS}
dms.blockchain.chain-id=${BASE_CHAIN_ID:84532}
dms.blockchain.gas-limit=3000000

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Error handling ──────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-stacktrace=on_param